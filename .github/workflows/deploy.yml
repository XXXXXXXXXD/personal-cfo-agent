name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Add your deployment step here, e.g., to GitHub Pages, Vercel, or Firebase Hosting
      # - name: Deploy
      #   run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
